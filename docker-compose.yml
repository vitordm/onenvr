services:
  onenvr:
    container_name: onenvr
    hostname: onenvr
    image: drprash/onenvr:latest
    ports:
      - "80:5000"
    volumes:
      - /path/to/onenvr/config:/config
      - /path/to/onenvr/storage:/storage
    environment:
      - TZ=America/New_York
      - DEBUG=false
    restart: unless-stopped
